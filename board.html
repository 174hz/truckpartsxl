<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Bounty Board | TruckPartsXL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #1d3557; --red: #e63946; --bg: #f0f4f8; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        nav { background: #fff; padding: 15px 5%; display: flex; justify-content: space-between; border-bottom: 4px solid var(--red); }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--navy); text-decoration: none; }
        .logo span { color: var(--red); }

        .board-header { text-align: center; padding: 40px 20px; background: var(--navy); color: white; }
        .board-header h1 { margin: 0; text-transform: uppercase; letter-spacing: 2px; }

        /* WIDE BOARD SETTINGS */
        .board-wrapper { 
            max-width: 98%; /* Forced nearly full width */
            margin: -20px auto 40px;
            background: white; border-radius: 12px; border: 3px solid var(--navy);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); overflow: hidden;
        }

        .sheet-container {
            width: 100%;
            height: 800px;
            overflow-x: auto; /* Enables horizontal swipe if columns get too many */
        }

        iframe { width: 100%; height: 100%; border: none; }

        .dealer-callout {
            max-width: 1200px; margin: 0 auto 50px; text-align: center;
            background: #fff; padding: 30px; border-radius: 12px; border: 2px solid var(--red);
        }
        .contact-btn {
            background: var(--navy); color: white; padding: 15px 30px; 
            text-decoration: none; border-radius: 5px; font-weight: 700;
        }
    </style>
</head>
<body>
    <nav><a href="index.html" class="logo">TRUCKPARTS<span>XL</span></a></nav>
    <div class="board-header"><h1>Live Parts Bounty Board</h1></div>
    <div class="board-wrapper">
        <div class="sheet-container">
            <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTYrAOOtTGO2mCi3sqBNaWAoM8PM8srskGBywloCDjBAgTH9BwzWlhQiWM2KNWy3uzds53j8rCcIsPG/pubhtml?gid=51250039&single=true&widget=true&headers=false"></iframe>
        </div>
    </div>
    <div class="dealer-callout">
        <h2>Have one of these parts?</h2>
        <p>Click below to provide your quote and contact information to the buyer.</p><br>
        <a href="https://forms.gle/YOUR_SECOND_FORM_LINK" class="contact-btn">I HAVE A PART - CONTACT BUYER</a>
    </div>
</body>
</html>
