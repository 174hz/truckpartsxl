<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Sales Feed | TruckPartsXL</title>
    <style>
        :root { --primary: #e63946; --bg: #0a0a0a; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; text-align: center; }
        
        nav { background: #000; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); }
        .logo { font-size: 1.8rem; font-weight: 900; letter-spacing: -1px; text-decoration: none; color: #fff; }
        .logo span { color: var(--primary); }
        
        .header-box { padding: 60px 5%; background: #111; }
        h1 { font-size: 3rem; font-weight: 900; margin: 0; color: var(--primary); text-transform: uppercase; letter-spacing: -1px; }
        
        .board-container { 
            max-width: 1100px; 
            margin: 40px auto; 
            background: #fff; 
            border-radius: 12px; 
            border: 4px solid #333;
            overflow: hidden; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Dark mode filter for the spreadsheet */
        iframe { 
            width: 100%; 
            height: 650px; 
            border: none;
            filter: invert(0.9) hue-rotate(180deg);
        }

        .seller-section { padding: 80px 20px; background: #111; border-top: 1px solid #222; }
        .seller-section h2 { font-size: 2.2rem; font-weight: 900; text-transform: uppercase; margin-bottom: 20px; }
        .btn-contact { display: inline-block; padding: 18px 40px; background: var(--primary); color: #fff; text-decoration: none; font-weight: 900; text-transform: uppercase; border-radius: 5px; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">TRUCKPARTS<span>XL</span></a>
        <a href="index.html" style="color:#fff; text-decoration: none; font-weight: 700; text-transform: uppercase;">← Post a Part</a>
    </nav>

    <div class="header-box">
        <h1>Live Bounty Board</h1>
        <p style="color:#aaa; font-size: 1.2rem; margin-top: 15px;">Real-time sales opportunities for verified yards and suppliers.</p>
    </div>

    <div class="board-container">
        <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTYrAOOtTGO2mCi3sqBNaWAoM8PM8srskGBywloCDjBAgTH9BwzWlhQiWM2KNWy3uzds53j8rCcIsPG/pubhtml?gid=1510344558&amp;single=true&amp;widget=false&amp;headers=false"></iframe>
    </div>

    <div class="seller-section">
        <h2>Do you have one of these parts?</h2>
        <p style="color:#aaa; margin-bottom: 30px;">Contact our administrative team to unlock buyer details and secure the sale.</p>
        <a href="mailto:support@truckpartsxl.com" class="btn-contact">Contact Admin</a>
    </div>

    <footer style="padding: 40px; color: #444; font-size: 0.8rem;">
        © 2026 TRUCKPARTSXL. Ancestral Wisdom. Modern Infrastructure.
    </footer>

</body>
</html>
