<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruckPartsXL | Live Parts Board</title>
    <style>
        /* Modern Reset and Page Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            background-color: #1d3557;
            color: white;
            width: 100%;
            padding: 20px 0;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* THE "SQUEEZE" CONTAINER - This fixes the width issue */
        .board-container {
            width: 95%;
            max-width: 950px; /* Limits the width so the 9 columns fill the box */
            margin-bottom: 50px;
        }

        .board-wrapper { 
            position: relative;
            background: white;
            border: 4px solid #1d3557;
            border-radius: 12px;
            overflow: hidden; /* Hides the extra empty Google Sheet columns */
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        /* Makes the iframe responsive within the wrapper */
        iframe {
            width: 100%;
            height: 900px;
            border: none;
            display: block;
        }

        /* Instructions below the board */
        .footer-text {
            margin-top: 15px;
            color: #457b9d;
            font-size: 0.9rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Live Parts Wanted Board</h1>
        <p>Real-time leads for truck parts buyers and sellers</p>
    </div>

    <div class="board-container">
        <div class="board-wrapper">
            <iframe src="https://docs.google.com/spreadsheets/d/e/YOUR_PUBLISH_LINK_HERE/pubhtml?widget=true&amp;headers=false"></iframe>
        </div>
        <div class="footer-text">
            * Board updates automatically every 5 minutes. High-priority (Yellow) leads are pinned to the top.
        </div>
    </div>

</body>
</html>
