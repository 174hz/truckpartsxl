<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruckPartsXL | Live Parts Board</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            background-color: #1d3557;
            color: white;
            width: 100%;
            padding: 20px 0;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* THE FIX: Narrower container + Overflow Hidden */
        .board-container {
            width: 98%;
            max-width: 860px; /* Reduced from 950 to 860 to snap to the Budget column */
            margin-bottom: 50px;
        }

        .board-wrapper { 
            position: relative;
            background: white;
            border: 3px solid #1d3557;
            border-radius: 8px;
            overflow: hidden; /* This physically cuts off the extra columns on the right */
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        iframe {
            width: 100%;
            height: 800px;
            border: none;
            display: block;
            /* This slight zoom helps fill the container better if columns are too thin */
            margin-right: -50px; 
        }

        .footer-text {
            margin-top: 15px;
            color: #457b9d;
            font-size: 0.85rem;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; font-size: 2rem;">LIVE PARTS BOUNTY BOARD</h1>
    </div>

    <div class="board-container">
        <div class="board-wrapper">
            <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTYrAOOtTGO2mCi3sqBNaWAoM8PM8srskGBywloCDjBAgTH9BwzWlhQiWM2KNWy3uzds53j8rCcIsPG/pubhtml?gid=51250039&amp;single=true&amp;widget=true&amp;headers=false"></iframe>
        </div>
        <div class="footer-text">
            * Board updates automatically. High-priority leads are pinned to the top.
        </div>
    </div>

</body>
</html>
