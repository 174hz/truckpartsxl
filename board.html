<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruckPartsXL | Bounty Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #1d3557; --red: #e63946; }
        body { font-family: 'Inter', sans-serif; background: #f0f4f8; margin: 0; }
        
        .nav { background: #fff; padding: 20px 5%; border-bottom: 4px solid var(--red); display: flex; justify-content: space-between; }
        .logo { font-weight: 900; color: var(--navy); text-decoration: none; font-size: 1.5rem; }
        
        .board-container { width: 95%; max-width: 1200px; margin: 40px auto; }
        .header { background: var(--navy); color: white; padding: 15px; border-radius: 8px 8px 0 0; text-align: center; font-weight: 700; text-transform: uppercase; }

        /* THE FIX: This container allows horizontal scrolling */
        .scroll-box {
            background: white;
            border: 4px solid var(--navy);
            border-radius: 0 0 8px 8px;
            overflow-x: auto; /* Enables the left-to-right swipe */
            -webkit-overflow-scrolling: touch;
        }

        /* THE FIX: This forces the sheet to stay wide so data stays in one line */
        iframe {
            width: 1500px; 
            height: 800px;
            border: none;
        }
    </style>
</head>
<body>

    <div class="nav">
        <a href="index.html" class="logo">TRUCKPARTS<span>XL</span></a>
        <a href="index.html" style="text-decoration:none; color:var(--navy); font-weight:700;">← Back</a>
    </div>

    <div class="board-container">
        <div class="header">Live Master Bounty Board</div>
        <div class="scroll-box">
            <iframe src="YOUR_GOOGLE_SHEET_PUBLISH_LINK_HERE&headers=false"></iframe>
        </div>
    </div>

</body>
</html>
