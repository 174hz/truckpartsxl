<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruckPartsXL | Master Bounty Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #1d3557; --red: #e63946; }
        body { font-family: 'Inter', sans-serif; background: #f0f4f8; margin: 0; padding: 0; }
        
        nav { background: #fff; padding: 20px 5%; border-bottom: 4px solid var(--red); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 900; color: var(--navy); text-decoration: none; font-size: 1.5rem; }
        .logo span { color: var(--red); }

        .board-container { width: 95%; max-width: 1400px; margin: 30px auto; }
        .header-bar { background: var(--navy); color: white; padding: 15px; border-radius: 8px 8px 0 0; text-align: center; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        /* THE HORIZONTAL ALIGNMENT FIX */
        .scroll-window {
            background: white;
            border: 4px solid var(--navy);
            border-radius: 0 0 8px 8px;
            overflow-x: auto; /* This allows the left-to-right swipe */
            display: block;
        }

        iframe {
            width: 1600px; /* Forces the columns to stay in a straight line */
            height: 800px;
            border: none;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">TRUCKPARTS<span>XL</span></a>
        <a href="index.html" style="text-decoration:none; color:var(--navy); font-weight:700;">← BACK TO REQUEST FORM</a>
    </nav>

    <div class="board-container">
        <div class="header-bar">Live Master Leads & Bounties</div>
        <div class="scroll-window">
            <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vT5q_YOUR_LINK_HERE/pubhtml?widget=true&amp;headers=false"></iframe>
        </div>
        <p style="text-align:center; color:#666; font-size:0.8rem; margin-top:10px;">Swipe left/right to view full entry details (OEM, Budget, Category)</p>
    </div>

</body>
</html>
